<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Булочная{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Prata&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% load static %}{% static 'bakery/css/style.css' %}">
</head>
<body>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<header class="site-header">
  <div class="container nav-wrap">
    <a href="{% url 'home' %}" class="logo">Хлебный Дом</a>
    <nav>
      <a href="{% url 'home' %}">Главная</a>
      <a href="{% url 'about' %}">О компании</a>
      <a href="{% url 'product_list' %}">Товары</a>
      <a href="{% url 'category_list' %}">Категории</a>
      <a href="{% url 'manufacturer_list' %}">Производители</a>
      <a href="{% url 'promotion_list' %}">Акции</a>
      <a href="{% url 'review_list' %}">Отзывы</a>
      <a href="{% url 'cart' %}">Корзина</a>
    </nav>
  </div>
</header>
<main class="container content-wrap">
  {% block content %}{% endblock %}
</main>
<footer class="site-footer">
  <div class="container">© 2026 Хлебный Дом · Свежая выпечка каждый день</div>
</footer>
</body>
</html>
