{% extends 'bakery/base.html' %}
{% load static %}
{% block title %}Производители{% endblock %}
{% block content %}
<h1>Производители</h1>
<div class="grid">
{% for m in manufacturers %}
  <article class="card">
    {% if m.logo %}<img src="{{ m.logo.url }}" alt="{{ m.name }}">{% else %}<img src="{% static 'bakery/img/placeholder-manufacturer.svg' %}" alt="Производитель">{% endif %}
    <h3>{{ m.name }}</h3>
    <p>{{ m.address }}</p>
    <a class="btn" href="{% url 'manufacturer_detail' m.pk %}">Подробнее</a>
  </article>
{% endfor %}
</div>
{% endblock %}
